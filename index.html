<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>我的网址导航</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f5ef;
      --surface: #ffffff;
      --surface-2: #eef5f2;
      --text: #202124;
      --muted: #687078;
      --line: #d8ddd9;
      --accent: #0f766e;
      --accent-2: #b45309;
      --shadow: 0 14px 35px rgba(32, 33, 36, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(180deg, rgba(15, 118, 110, 0.08), transparent 260px),
        var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .shell {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 34px 0 42px;
    }

    header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: end;
      gap: 18px;
      padding: 12px 0 22px;
      border-bottom: 1px solid var(--line);
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 46px);
      font-weight: 800;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 10px 0 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(110px, 1fr));
      gap: 10px;
    }

    .stat {
      min-width: 128px;
      padding: 12px 14px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .stat strong {
      display: block;
      font-size: 24px;
      line-height: 1.2;
    }

    .stat span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
    }

    .tools {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      margin: 22px 0 18px;
    }

    .search {
      width: 100%;
      height: 46px;
      padding: 0 16px;
      color: var(--text);
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      outline: none;
      font-size: 16px;
    }

    .search:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.14);
    }

    .sort {
      height: 46px;
      padding: 0 14px;
      color: var(--text);
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      font-size: 15px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px;
    }

    .card {
      display: grid;
      gap: 12px;
      min-height: 154px;
      padding: 16px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      transition: transform 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
    }

    .card:hover {
      transform: translateY(-2px);
      border-color: rgba(15, 118, 110, 0.45);
      box-shadow: 0 18px 40px rgba(15, 118, 110, 0.12);
    }

    .card-title {
      margin: 0;
      font-size: 17px;
      line-height: 1.55;
      font-weight: 700;
    }

    .meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 13px;
    }

    .badge {
      flex: 0 0 auto;
      padding: 4px 8px;
      color: #6b3b00;
      background: #fff4df;
      border: 1px solid #f2d19c;
      border-radius: 999px;
    }

    .url {
      overflow: hidden;
      color: var(--accent);
      font-size: 13px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .empty {
      display: none;
      padding: 34px;
      text-align: center;
      color: var(--muted);
      background: var(--surface-2);
      border: 1px dashed var(--line);
      border-radius: 8px;
    }

    footer {
      margin-top: 26px;
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 720px) {
      .shell {
        width: min(100% - 24px, 1120px);
        padding-top: 20px;
      }

      header,
      .tools {
        grid-template-columns: 1fr;
      }

      .stats {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .stat {
        min-width: 0;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header>
      <div>
        <h1>我的网址导航</h1>
        <p class="subtitle">从微信公众号文章目录生成，点击任意卡片即可打开对应链接。</p>
      </div>
      <div class="stats" aria-label="导航统计">
        <div class="stat">
          <strong id="totalCount">108</strong>
          <span>已收藏网站</span>
        </div>
        <div class="stat">
          <strong>2026-05-29</strong>
          <span>最近更新</span>
        </div>
      </div>
    </header>

    <section class="tools" aria-label="筛选工具">
      <input id="search" class="search" type="search" placeholder="搜索标题、日期或链接" autocomplete="off">
      <select id="sort" class="sort" aria-label="排序">
        <option value="newest">最新在前</option>
        <option value="oldest">最早在前</option>
        <option value="title">标题排序</option>
      </select>
    </section>

    <section id="grid" class="grid" aria-live="polite"></section>
    <div id="empty" class="empty">没有找到匹配的网址</div>

    <footer>数据来源：微信公众号文章目录.xlsx</footer>
  </main>

    const grid = document.querySelector("#grid");
    const empty = document.querySelector("#empty");
    const search = document.querySelector("#search");
    const sort = document.querySelector("#sort");
    const totalCount = document.querySelector("#totalCount");

    function normalize(value) {
      return String(value || "").toLowerCase();
    }

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function getSorted(items) {
      const mode = sort.value;
      return [...items].sort((a, b) => {
        if (mode === "oldest") return normalize(a.publishedAt).localeCompare(normalize(b.publishedAt));
        if (mode === "title") return normalize(a.title).localeCompare(normalize(b.title), "zh-CN");
        return normalize(b.publishedAt).localeCompare(normalize(a.publishedAt));
      });
    }

    function render() {
      const keyword = normalize(search.value).trim();
      const filtered = bookmarks.filter((item) => {
        const haystack = normalize(`${item.title} ${item.publishedAt} ${item.url}`);
        return haystack.includes(keyword);
      });

      totalCount.textContent = filtered.length;
      grid.innerHTML = getSorted(filtered).map((item, index) => `
        <a class="card" href="${escapeHtml(item.url)}" target="_blank" rel="noopener noreferrer">
          <p class="card-title">${escapeHtml(item.title)}</p>
          <div class="meta">
            <span>${escapeHtml(item.publishedAt || "未标注时间")}</span>
            <span class="badge">#${index + 1}</span>
          </div>
          <span class="url">${escapeHtml(item.url)}</span>
        </a>
      `).join("");
      empty.style.display = filtered.length ? "none" : "block";
    }

    search.addEventListener("input", render);
    sort.addEventListener("change", render);
    render();
  </script>
